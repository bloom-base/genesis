<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <canvas id="game-canvas"></canvas>

        <!-- Title / Pause overlay -->
        <div id="overlay">
            <div id="title-screen">
                <h1 id="game-title">GENESIS</h1>
                <p id="game-subtitle">An infinite world awaits</p>
                <button id="enter-btn">Enter World</button>
                <p id="controls-hint">
                    WASD&nbsp;·&nbsp;Move &nbsp;|&nbsp;
                    Mouse&nbsp;·&nbsp;Look &nbsp;|&nbsp;
                    Shift&nbsp;·&nbsp;Sprint &nbsp;|&nbsp;
                    1–9&nbsp;·&nbsp;Hotbar &nbsp;|&nbsp;
                    I&nbsp;·&nbsp;Inventory &nbsp;|&nbsp;
                    ESC&nbsp;·&nbsp;Pause
                </p>
            </div>
            <p id="paused-label">PAUSED — Click to resume</p>
        </div>

        <!-- In-game HUD -->
        <div id="hud">
            <div id="crosshair">+</div>

            <!-- Hotbar — always visible while in-world, populated by inventoryUI.js -->
            <div id="hotbar"></div>

            <!-- Briefly shown name of the selected hotbar item -->
            <div id="selected-item-name"></div>
        </div>

        <!-- ── Inventory Panel ──────────────────────────────────────────────── -->
        <!--
            Shown when the player presses I or E.
            Pointer lock is released while this is open so the mouse can interact.
        -->
        <div id="inventory-panel" style="display:none" role="dialog" aria-label="Inventory">
            <div id="inventory-window">

                <!-- Header -->
                <div id="inventory-header">
                    <span id="inventory-title">Inventory</span>
                    <button id="inventory-close" title="Close (I)">✕</button>
                </div>

                <!-- Category filter tabs — injected by inventoryUI.js -->
                <div id="inventory-tabs" role="tablist" aria-label="Filter by category"></div>

                <!-- 4 × 9 item grid — injected by inventoryUI.js -->
                <div id="inventory-grid" aria-label="Inventory slots"></div>

                <!-- Hotbar row for equipping — injected by inventoryUI.js -->
                <div id="inv-hotbar-label">Hotbar</div>
                <div id="inv-panel-hotbar" aria-label="Hotbar slots"></div>

            </div>
        </div>

    </div>

    <footer id="site-footer">
        <span id="visit-counter">Visits: 1</span>
    </footer>

    <script type="module" src="src/app.js"></script>
</body>
</html>
