<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <canvas id="game-canvas"></canvas>

        <!-- Title / Pause overlay -->
        <div id="overlay">
            <div id="title-screen">
                <h1 id="game-title">GENESIS</h1>
                <p id="game-subtitle">An infinite world awaits</p>
                <button id="enter-btn">Enter World</button>
                <p id="controls-hint">
                    WASD&nbsp;·&nbsp;Move &nbsp;|&nbsp; Mouse&nbsp;·&nbsp;Look &nbsp;|&nbsp; Shift&nbsp;·&nbsp;Sprint &nbsp;|&nbsp; ESC&nbsp;·&nbsp;Pause
                </p>
            </div>
            <p id="paused-label">PAUSED — Click to resume</p>
        </div>

        <!-- In-game HUD -->
        <div id="hud">
            <div id="crosshair">+</div>
        </div>
    </div>

    <footer id="site-footer">
        <span id="visit-counter">Visits: 1</span>
    </footer>

    <script type="module" src="src/app.js"></script>
</body>
</html>
