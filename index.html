<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <canvas id="game-canvas"></canvas>

        <!-- Title / Pause overlay -->
        <div id="overlay">
            <div id="title-screen">
                <h1 id="game-title">GENESIS</h1>
                <p id="game-subtitle">An infinite world awaits</p>
                <button id="enter-btn">Enter World</button>
                <p id="controls-hint">
                    WASD&nbsp;·&nbsp;Move &nbsp;|&nbsp; Mouse&nbsp;·&nbsp;Look &nbsp;|&nbsp; Shift&nbsp;·&nbsp;Sprint &nbsp;|&nbsp; 1–9&nbsp;·&nbsp;Hotbar &nbsp;|&nbsp; ESC&nbsp;·&nbsp;Pause
                </p>
            </div>
            <p id="paused-label">PAUSED — Click to resume</p>
        </div>

        <!-- In-game HUD -->
        <div id="hud">
            <div id="crosshair">+</div>

            <!-- Mana bar — floats just above the hotbar -->
            <div id="mana-bar-wrap">
                <span id="mana-label">MANA</span>
                <div id="mana-bar">
                    <div id="mana-bar-fill"></div>
                </div>
                <span id="mana-text">100 / 100</span>
            </div>

            <!-- Hotbar — 9 item/spell slots, keys 1-9 -->
            <div id="hotbar">
                <div class="hotbar-slot active" data-slot="1">
                    <span class="hotbar-key">1</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="2">
                    <span class="hotbar-key">2</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="3">
                    <span class="hotbar-key">3</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="4">
                    <span class="hotbar-key">4</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="5">
                    <span class="hotbar-key">5</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="6">
                    <span class="hotbar-key">6</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="7">
                    <span class="hotbar-key">7</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="8">
                    <span class="hotbar-key">8</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
                <div class="hotbar-slot" data-slot="9">
                    <span class="hotbar-key">9</span>
                    <span class="hotbar-icon"></span>
                    <span class="hotbar-count"></span>
                </div>
            </div>
        </div>
    </div>

    <footer id="site-footer">
        <span id="visit-counter">Visits: 1</span>
    </footer>

    <script type="module" src="src/app.js"></script>
</body>
</html>
